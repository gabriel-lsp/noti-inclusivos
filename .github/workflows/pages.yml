name: Publicar GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar sitio estatico
        run: |
          mkdir -p _site
          cp -r index.html app.js data assets .nojekyll _site/ 2>/dev/null || true
          cp -r patron-shipibo.png _site/ 2>/dev/null || true

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir sitio estatico
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
