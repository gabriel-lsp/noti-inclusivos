name: Actualizar Inicio principal a GitHub Pages

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/actualizar-enlaces-netlify.yml"

permissions:
  contents: write

jobs:
  actualizar-enlaces:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Corregir enlaces del inicio principal
        run: |
          find . -type f \
            \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.md" -o -name "*.txt" -o -name "*.json" -o -name "*.xml" \) \
            -not -path "./.git/*" \
            -not -path "./.github/workflows/actualizar-enlaces-netlify.yml" \
            -print0 | xargs -0 sed -i \
            -e 's#https://crebe-ucayali.netlify.app/#https://crebe-ucayali.github.io/#g' \
            -e 's#https://crebe-ucayali.netlify.app#https://crebe-ucayali.github.io/#g'

      - name: Verificar que no queden enlaces anteriores
        run: |
          if git grep -n "crebe-ucayali.netlify.app" -- ':!/.github/workflows/actualizar-enlaces-netlify.yml'; then
            echo "Aún quedan enlaces de Netlify por corregir."
            exit 1
          fi

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add .
            git commit -m "Corregir Inicio principal hacia crebe-ucayali.github.io"
            git push
          else
            echo "No quedan enlaces por actualizar."
          fi
