<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="titulo descripcion">
  <title id="titulo">Imagen predeterminada del Notiblog Inclusivo</title>
  <desc id="descripcion">Fondo institucional azul y verde con patrón geométrico inspirado en la identidad visual del ecosistema CREBE.</desc>
  <defs>
    <linearGradient id="fondo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3550"/>
      <stop offset="0.52" stop-color="#0f4f57"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <pattern id="patron" width="170" height="126" patternUnits="userSpaceOnUse">
      <path d="M10 30 H42 V14 H74 V56 H108 V30 H142 V72 H162" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.34"/>
      <path d="M14 88 H48 V62 H78 V104 H118 V80 H156" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.24"/>
      <path d="M34 44 h18 m-9 -9 v18 M122 98 h18 m-9 -9 v18" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="1200" height="720" fill="url(#fondo)"/>
  <rect width="1200" height="720" fill="url(#patron)"/>
  <circle cx="950" cy="510" r="220" fill="#ffffff" opacity="0.08"/>
  <circle cx="980" cy="540" r="320" fill="#ffffff" opacity="0.05"/>
  <g fill="#ffffff">
    <text x="80" y="340" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800">Notiblog Inclusivo</text>
    <text x="80" y="405" font-family="Arial, Helvetica, sans-serif" font-size="30" opacity="0.92">Lecturas Inclusivas - CREBE Ucayali</text>
  </g>
</svg>